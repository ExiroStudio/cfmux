name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: cfmux-linux-amd64

          - goos: linux
            goarch: arm64
            binary: cfmux-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build binary
        run: |
          mkdir -p dist

          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          CGO_ENABLED=0 \
          go build \
            -ldflags "\
            -s -w \
            -X 'cfmux/internal/version.Version=${{ github.ref_name }}' \
            -X 'cfmux/internal/version.Commit=${{ steps.vars.outputs.sha_short }}' \
            -X 'cfmux/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)'" \
            -o dist/${{ matrix.binary }}

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.binary }}